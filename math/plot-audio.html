<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Uhr</title>
    <link rel="icon" href="../media/favicon2.png" type="img/png">
    <link rel="stylesheet" href="./mathplot.css" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>
    
<canvas id="mathCanvas"></canvas>
<button class="text-button" onclick="audioAbspielen()">Audio abspielen</button>

<script>
    // --- 1. EINSTELLUNGEN ---
    const WIDTH = 1600;
    const HEIGHT = 1000;
    
    const x1 = -8;
    const x2 = 8;
    const y1 = -5;
    const y2 = 5;

    // --- 2. CANVAS INITIALISIEREN ---
    const canvas = document.getElementById('mathCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    function mathToCanvas(mathX, mathY) {
        const cx = ((mathX - x1) / (x2 - x1)) * WIDTH;
        const cy = HEIGHT - ((mathY - y1) / (y2 - y1)) * HEIGHT;
        return { cx, cy };
    }

    // --- 3. FUNKTIONEN: putPixel und putText---
    function putPixel(x, y, r, g, b, thickness = 1) {
        const { cx, cy } = mathToCanvas(x, y);
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(cx - thickness / 2, cy - thickness / 2, thickness, thickness);
    }
    
    function putText(text, x, y, r, g, b, size = 16) {
        // 1. Mathe-Koordinaten in Canvas-Pixel umrechnen
        const { cx, cy } = mathToCanvas(x, y);
    
        // 2. Farbe und Schriftart setzen
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.font = `${size}px Arial, sans-serif`;
    
        // 3. Ausrichtung anpassen (damit der Text genau auf dem Punkt (x,y) sitzt)
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
    
        // 4. Text auf die Canvas zeichnen
        ctx.fillText(text, cx, cy);
    }

    // --- 4. KOORDINATENSYSTEM ZEICHNEN ---
    function drawCoordinateSystem() {
        ctx.strokeStyle = "#ccc";
        ctx.fillStyle = "#333";
        ctx.font = "14px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const origin = mathToCanvas(0, 0);

        ctx.beginPath();
        ctx.moveTo(0, origin.cy);
        ctx.lineTo(WIDTH, origin.cy);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(origin.cx, 0);
        ctx.lineTo(origin.cx, HEIGHT);
        ctx.stroke();

        for (let i = Math.ceil(x1); i <= Math.floor(x2); i++) {
            const pos = mathToCanvas(i, 0);
            ctx.beginPath();
            ctx.moveTo(pos.cx, origin.cy - 5);
            ctx.lineTo(pos.cx, origin.cy + 5);
            ctx.stroke();
            if (i !== 0) ctx.fillText(i, pos.cx, origin.cy + 15);
        }

        for (let i = Math.ceil(y1); i <= Math.floor(y2); i++) {
            const pos = mathToCanvas(0, i);
            ctx.beginPath();
            ctx.moveTo(origin.cx - 5, pos.cy);
            ctx.lineTo(origin.cx + 5, pos.cy);
            ctx.stroke();
            if (i !== 0) ctx.fillText(i, origin.cx - 15, pos.cy);
        }
    }

    // --- 5. clearCanvas ---
    function clearCanvas() {
        // Löscht alles von den Koordinaten (0,0) bis zur maximalen Breite und Höhe
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  
    // --- 6. AUDIO FUNKTION ---
    // mathFunc: Eine anonyme Funktion (Pfeil-Notation), die das Signal in Abhängigkeit von t berechnet
    // tStart: Startzeitpunkt für t (in Sekunden)
    // tEnd: Endzeitpunkt für t (in Sekunden)
    let audioCtx = null; // audioCtx AUSSERHALB der Funktion deklarieren
    function playSound(mathFunc, tStart, tEnd) {
        // Nur initialisieren, wenn es noch keinen AudioContext gibt
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
        }

        const sampleRate = audioCtx.sampleRate; 
        const duration = tEnd - tStart;
        
        if (duration <= 0) return;

        const frameCount = Math.floor(sampleRate * duration);
        const buffer = audioCtx.createBuffer(1, frameCount, sampleRate);
        const channelData = buffer.getChannelData(0);

        for (let i = 0; i < frameCount; i++) {
            const t = tStart + (i / sampleRate);
            channelData[i] = mathFunc(t);
        }

        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start();
    }

    // Hilfsfunktion sleep
    function sleep(ms) {
        return new Promise(function(resolve) {
            setTimeout(resolve, ms);
        });
    }

    ///////////////////////////////////////////////////////////////////////////////
    // NUR INNERHALB DER NACHFOLGENDEN FUNKTIONEN ZEICHNEN UND AUDIOABSPIELEN DARF
    // ETWAS VERÄNDERT WERDEN UND ES SIND NUR FOLGENDE DINGE ERLAUB:
    //    * putPixel(...)
    //    * putText(...)
    //    * clearCanvas()
    //    * playSound(...)
    //    * await sleep(Millisekunden)
    //    * Variablendefinitionen, Schleifen, Fallunterscheidungen (if-else)
    //    * drawCoordinateSystem() auskommentieren oder nicht
    //    * Kommentare
    ///////////////////////////////////////////////////////////////////////////////
    // ANFANG ZEICHENBEREICH / AUDIOBEREICH
    ///////////////////////////////////////////////////////////////////////////////

    async function zeichnen() {
        while (1==1) {
            clearCanvas();
            drawCoordinateSystem();
   
            for (let t = 0; t <= 1; t += 0.001) {
                let x = -5 + t * (6 - (-5)); 
                let y = -2 + t * (1 - (-2));
                putPixel(x, y, 255, 0, 0, 2); 
                // await sleep(1);
            }

            const jetzt = new Date();
            let h = jetzt.getHours();         // Stunden (0-23)
            let m = jetzt.getMinutes();       // Minuten (0-59)
            let s = jetzt.getSeconds();       // Sekunden (0-59)
            let ms = jetzt.getMilliseconds(); // Millisekunden (0-999)
        
            putText("Uhrzeit: " + String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0") + ":"
                    + String(s).padStart(2, "0") + "." + String(ms).padStart(3, "0"), 6.1, 1.1, 255, 0, 0, 16);
            await sleep(1);
        }
    }
  
    async function audioAbspielen() {
        // Spielt ein A3 bzw. kleines a (220 Hz) für t von 0 bis 5 Sekunden
        playSound((t) => 0.3 * (Math.sin(220 * 2 * Math.PI * t) + Math.sin(222 * 2 * Math.PI * t)), 0, 5);

        await sleep(1000);
        playSound((t) => 0.2 * Math.sin(220 * Math.pow(2,4/12) * 2 * Math.PI * t), 0, 4); // große Terz
        await sleep(1000);
        playSound((t) => 0.1 * Math.sin(220 * Math.pow(2,7/12) * 2 * Math.PI * t), 0, 3); // reine Quint
        await sleep(1000);
        playSound((t) => 0.1 * Math.sin(440 *  2 * Math.PI * t), 0, 2);      //  Oktave
    }
  
    ///////////////////////////////////////////////////////////////////////////////
    // ENDE ZEICHENBEREICH / AUDIOBEREICH
    ///////////////////////////////////////////////////////////////////////////////

    zeichnen();
</script>
</body>
</html>
