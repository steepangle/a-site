<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhr</title>
    <link rel="icon" href="../media/favicon2.png" type="img/png">
    <link rel="stylesheet" href="./mathplot.css" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>

    <canvas id="mathCanvas"></canvas>

    <script>
        // --- 1. EINSTELLUNGEN ---
        const WIDTH = 1600;
        const HEIGHT = 1000;

        const x1 = -8;
        const x2 = 8;
        const y1 = -5;
        const y2 = 5;

        // --- 2. CANVAS INITIALISIEREN ---
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        function mathToCanvas(mathX, mathY) {
            const cx = ((mathX - x1) / (x2 - x1)) * WIDTH;
            const cy = HEIGHT - ((mathY - y1) / (y2 - y1)) * HEIGHT;
            return { cx, cy };
        }

        // --- 3. FUNKTIONEN: putPixel und putText---
        function putPixel(x, y, r, g, b, thickness = 1) {
            const { cx, cy } = mathToCanvas(x, y);
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.fillRect(cx - thickness / 2, cy - thickness / 2, thickness, thickness);
        }

        function putText(text, x, y, r, g, b, size = 16) {
            // 1. Mathe-Koordinaten in Canvas-Pixel umrechnen
            const { cx, cy } = mathToCanvas(x, y);

            // 2. Farbe und Schriftart setzen
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.font = `${size}px Arial, sans-serif`;

            // 3. Ausrichtung anpassen (damit der Text genau auf dem Punkt (x,y) sitzt)
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // 4. Text auf die Canvas zeichnen
            ctx.fillText(text, cx, cy);
        }

        // --- 4. KOORDINATENSYSTEM ZEICHNEN ---
        function drawCoordinateSystem() {
            ctx.strokeStyle = "#ccc";
            ctx.fillStyle = "#333";
            ctx.font = "14px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            const origin = mathToCanvas(0, 0);

            ctx.beginPath();
            ctx.moveTo(0, origin.cy);
            ctx.lineTo(WIDTH, origin.cy);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(origin.cx, 0);
            ctx.lineTo(origin.cx, HEIGHT);
            ctx.stroke();

            for (let i = Math.ceil(x1); i <= Math.floor(x2); i++) {
                const pos = mathToCanvas(i, 0);
                ctx.beginPath();
                ctx.moveTo(pos.cx, origin.cy - 5);
                ctx.lineTo(pos.cx, origin.cy + 5);
                ctx.stroke();
                if (i !== 0) ctx.fillText(i, pos.cx, origin.cy + 15);
            }

            for (let i = Math.ceil(y1); i <= Math.floor(y2); i++) {
                const pos = mathToCanvas(0, i);
                ctx.beginPath();
                ctx.moveTo(origin.cx - 5, pos.cy);
                ctx.lineTo(origin.cx + 5, pos.cy);
                ctx.stroke();
                if (i !== 0) ctx.fillText(i, origin.cx - 15, pos.cy);
            }
        }

        // --- 5. clearCanvas ---
        function clearCanvas() {
            // Löscht alles von den Koordinaten (0,0) bis zur maximalen Breite und Höhe
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Hilfsfunktion sleep
        function sleep(ms) {
            return new Promise(function (resolve) {
                setTimeout(resolve, ms);
            });
        }

        ///////////////////////////////////////////////////////////////////////////////
        // NUR INNEHALB DER NACHFOLGENDEN FUNKTION ZEICHNEN DARF ETWAS VERÄNDERT WERDEN
        // UND ES SIND NUR FOLGENDE DINGE ERLAUB:
        //    * putPixel(...)
        //    * putText(...)
        //    * clearCanvas()
        //    * await sleep(Millisekunden)
        //    * Variablendefinitionen, Schleifen, Fallunterscheidungen (if-else)
        //    * drawCoordinateSystem() auskommentieren oder nicht
        //    * Kommentare
        ///////////////////////////////////////////////////////////////////////////////
        // ANFANG ZEICHENBEREICH //////////////////////////////////////////////////////
        ///////////////////////////////////////////////////////////////////////////////

        async function zeichnen() {
            while (true) {
                clearCanvas();
                // drawCoordinateSystem();

                let sekundenZeiger = true;     // toggle Sekundenzeiger
                let tickTack = false;          // toggle ticking/floating Sekundenzeiger

                // Uhrzeit
                const time = new Date();
                let h = time.getHours() + time.getMinutes() / 60;
                let m = time.getMinutes() + time.getSeconds() / 60;
                let s = (!tickTack) ? (time.getSeconds() + time.getMilliseconds() / 1000) : (time.getSeconds());

                // Ziffernblatt
                for (let t = 0; t <= (2 * Math.PI); t += 0.001) {
                    putPixel(4 * Math.cos(t), 4 * Math.sin(t), 0, 0, 0, 7);
                }

                // Minuten- und Stundenstriche (60x)
                for (let i = 0; i < 60; i++) {
                    let winkel = (i * 2 * Math.PI) / 60;

                    let startRadius = 3.7; // Startpunkt Minutenstriche
                    let dicke = 2;         // Standard-Dicke

                    if (i % 5 === 0) {
                        // Volle Stunde
                        startRadius = 3.5; // Längerer Strich
                        dicke = 5;         // Fett

                        if (i % 15 === 0) {
                            // Die Hauptstunden:
                            startRadius = 3.3; // Noch länger
                            dicke = 9;         // Extra fett
                        }
                    }

                    // Strich zeichnen
                    for (let r = startRadius; r <= 4.0; r += 0.01) {
                        let x = r * Math.cos(winkel);
                        let y = r * Math.sin(winkel);
                        putPixel(x, y, 0, 0, 0, dicke);
                    }
                }

                // Alle Stundenzahlen von 1 bis 12 automatisch platzieren
                for (let stunde = 1; stunde <= 12; stunde++) {

                    let winkelZahl = (Math.PI / 2) - (stunde * (Math.PI / 6));

                    let xZahl = 3 * Math.cos(winkelZahl);
                    let yZahl = 3 * Math.sin(winkelZahl);

                    // Hauptstunden größer
                    let groesse = (stunde % 3 === 0) ? 40 : 24;

                    putText(stunde.toString(), xZahl, yZahl, 0, 0, 0, groesse);
                }

                // ZEIGER Positionen
                let winkelStd = (Math.PI / 2) - h * (Math.PI / 6);
                let winkelMin = (Math.PI / 2) - m * (Math.PI / 30);
                let winkelSek = (Math.PI / 2) - s * (Math.PI / 30);

                // SEKUNDENZEIGER
                if (sekundenZeiger) {
                    for (let l = 0; l <= 3.8; l += 0.01) {
                        let x = l * Math.cos(winkelSek);
                        let y = l * Math.sin(winkelSek);
                        putPixel(x, y, 255, 255, 0, 2); // Gelber Zeiger                
                    }
                }

                // MINUTENZEIGER
                for (let l = 0; l <= 2.5; l += 0.01) {
                    let x = l * Math.cos(winkelMin);
                    let y = l * Math.sin(winkelMin);
                    putPixel(x, y, 0, 0, 255, 4); // Blauer Zeiger
                }

                // STUNDENZEIGER
                for (let l = 0; l <= 2.1; l += 0.01) {
                    let x = l * Math.cos(winkelStd);
                    let y = l * Math.sin(winkelStd);
                    putPixel(x, y, 255, 0, 0, 6); // Roter Zeiger
                }

                // MITTELPUNKT
                for (let r = 0; r <= 0.12; r += 0.01) {
                    for (let t = 0; t <= 2 * Math.PI; t += 0.1) {
                        putPixel(r * Math.cos(t), r * Math.sin(t), 0, 0, 0, 2);
                    }
                }
                await sleep(50);
            }
        }

        ///////////////////////////////////////////////////////////////////////////////
        // ENDE ZEICHENBEREICH ////////////////////////////////////////////////////////
        ///////////////////////////////////////////////////////////////////////////////

        zeichnen();
    </script>
</body>

</html>
